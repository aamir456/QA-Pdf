apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: pdf-qa
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/part-of: pdf-qa
spec:
  # Single replica — ChromaDB uses ReadWriteOnce EBS which only allows one pod.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chromadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromadb
        app.kubernetes.io/part-of: pdf-qa
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.5.23
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER
              value: "none"
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: /chroma/chroma
          volumeMounts:
            - name: data
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chromadb-data
