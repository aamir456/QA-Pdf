apiVersion: v1
kind: Service
metadata:
  name: query-api
  namespace: pdf-qa
  labels:
    app.kubernetes.io/name: query-api
    app.kubernetes.io/part-of: pdf-qa
  annotations:
    # Creates an AWS Network Load Balancer instead of a Classic ELB
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: query-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
