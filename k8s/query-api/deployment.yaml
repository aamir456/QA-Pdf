apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: pdf-qa
  labels:
    app.kubernetes.io/name: query-api
    app.kubernetes.io/part-of: pdf-qa
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: query-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: query-api
        app.kubernetes.io/part-of: pdf-qa
    spec:
      serviceAccountName: query-api
      containers:
        - name: query-api
          # IMAGE_PLACEHOLDER is replaced by the CI/CD pipeline with the ECR image URI.
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: pdf-qa-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pdf-qa-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
      # Spread replicas across nodes for availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: query-api
